<svg width="680" height="370" viewBox="0 0 680 370" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Default stream vs multiple CUDA streams, shared time axis</title>
<desc>Timeline diagram with a single shared time axis. The top row shows three independent tasks running fully sequentially on the default stream, ending at time unit nine. Below it, three concurrent streams show the same tasks with transfers and kernels overlapping, ending at time unit five, so the four unit time saving can be read directly off the shared axis.</desc>
